<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Gallery Template</title>
  <style>
    body { 
      margin: 0; 
      font-family: Arial, sans-serif; 
      background-color: #f4f4f9; 
      color: #333; 
    }
    header { 
      background-color: #2c3e50; 
      color: white; 
      padding: 2rem; 
      text-align: center; 
    }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .video-card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .video-card:hover {
      transform: scale(1.02);
    }
    .thumbnail {
      width: 100%;
      height: 160px;
      background-color: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    .info {
      padding: 15px;
    }
    .title {
      font-weight: bold;
      margin-bottom: 5px;
    }
    /* Modal Styles */
    #modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      width: 90%;
      max-width: 800px;
      background: #000;
      position: relative;
    }
    .close-btn {
      position: absolute;
      top: -40px;
      right: 0;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      background: none;
      border: none;
    }
    iframe {
      width: 100%;
      aspect-ratio: 16/9;
      border: none;
    }
  </style>
</head>
<body>

<header>
  <h1>My Video Collection</h1>
</header>

<div class="video-grid" id="videoGrid"></div>

<div id="modal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal()">×</button>
    <div id="player"></div>
  </div>
</div>

<script>
  const videoData = [
    { id: 1, title: "Nature Scenery", embedUrl: "https://youtube.com" },
    { id: 2, title: "City Lights", embedUrl: "https://youtube.com" }
  ];

  function loadGallery() {
    const grid = document.getElementById('videoGrid');
    grid.innerHTML = videoData.map(v => `
      <div class="video-card" onclick="openModal('${v.embedUrl}')">
        <div class="thumbnail">▶</div>
        <div class="info">
          <div class="title">${v.title}</div>
        </div>
      </div>
    `).join('');
  }

  function openModal(url) {
    document.getElementById('player').innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
    document.getElementById('modal').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
    document.getElementById('player').innerHTML = '';
  }

  loadGallery();
</script>

</body>
</html>
